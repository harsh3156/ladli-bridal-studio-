version: '3.9'

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ladli-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./src/uploads:/app/src/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ladli-network
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:5000/health', r => r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── MongoDB (local dev/testing) ─────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ladli-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ladli_admin
      MONGO_INITDB_ROOT_PASSWORD: ladli_secret_2024
      MONGO_INITDB_DATABASE: ladli_bridal_studio
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ladli-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ladli-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - ladli-network

volumes:
  mongo-data:
    driver: local

networks:
  ladli-network:
    driver: bridge
